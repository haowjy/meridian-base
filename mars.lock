[dependency_model_aliases.codex]
description = "Default backend implementer. Fast, token-efficient, faithful to instructions. Weak at frontend."
default_effort = "high"
provider = "openai"
match = ["gpt-*-codex"]
exclude = [
    "*-mini",
    "*-spark",
    "*-max",
]

[dependency_model_aliases.composer]
harness = "cursor"
description = "Cursor's native coding model. Fast, strong tool use."
model = "composer-2.5"
provider = "cursor"

[dependency_model_aliases.deepseek]
description = "DeepSeek V4 Pro - cheap, all around good text coder for constrained tasks"
default_effort = "high"
model = "deepseek-v4-pro"

[dependency_model_aliases.deepseekflash]
description = "DeepSeek V4 Flash - cheap, all around good text coder for constrained tasks"
default_effort = "high"
model = "deepseek-v4-flash"

[dependency_model_aliases.gpt]
description = "Strongest generalist. Best all-around judgment, nuanced review, verification, and architectural reasoning."
default_effort = "high"
model = "gpt-5.4"
match = ["gpt-5*"]
exclude = [
    "*codex*",
    "*-pro",
    "*-mini",
    "*-nano",
    "*-chat",
    "*-turbo",
]

[dependency_model_aliases.gpt55]
description = "GPT-5.5 — action-oriented, fast. Best on low effort; overthinks on high. Good clean code output but weak at nuanced judgment."
default_effort = "low"
model = "gpt-5.5"

[dependency_model_aliases.gptmini]
description = "Fast and cheap. Good for bulk exploration and simple tasks."
default_effort = "high"
provider = "openai"
match = ["gpt-5*-mini"]
exclude = ["*-nano"]

[dependency_model_aliases.opus]
harness = "claude"
description = "Best for orchestration, frontend, UI/UX, and creative work. Strong instruction-following."
default_effort = "high"
model = "claude-opus-4-6"
match = ["*opus*"]
exclude = ["*:*"]

[dependency_model_aliases.opus46]
harness = "claude"
description = "Opus 4.6 — best generic model for infering human intent and generically very good at everything."
default_effort = "high"
model = "claude-opus-4-6"

[dependency_model_aliases.opus47]
harness = "claude"
description = "Opus 4.7 — Best agentic coding. Literal instruction-following breaks complex prompts. Best at UI/UX design work."
default_effort = "high"
model = "claude-opus-4-7"

[dependency_model_aliases.opus48]
harness = "claude"
description = "Opus 4.8 — Long horizon tasks and best orchestration model."
default_effort = "high"
model = "claude-opus-4-8"

[dependency_model_aliases.sonnet]
harness = "claude"
description = "Balanced Claude model - good reasoning at lower cost than Opus. Good writing/documentation style."
default_effort = "high"
provider = "anthropic"
match = ["*sonnet*"]
exclude = ["*:*"]
