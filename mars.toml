[package]
name = "meridian-base"
version = "0.4.19"
description = "Core coordination primitives for Meridian — orchestrator, subagent, and skills for spawning, state tracking, and session context."

[dependencies]

[local-dependencies.meridian-prompter]
url = "https://github.com/meridian-flow/meridian-prompter"

[settings]
models_cache_ttl_hours = 24

[models.composer]
description = "Cursor's native coding model. Fast, strong tool use."
model = "composer-2.5"
provider = "cursor"

[models.gpt55]
description = "GPT-5.5 — action-oriented, fast. Best on low effort; overthinks on high. Good clean code output but weak at nuanced judgment."
default_effort = "low"
model = "gpt-5.5"
# provider = "openai"

[models.deepseek]
description = "DeepSeek V4 Pro - cheap, all around good text coder for constrained tasks"
default_effort = "high"
model = "deepseek-v4-pro"
# provider = "opencode"

[models.deepseekflash]
description = "DeepSeek V4 Flash - cheap, all around good text coder for constrained tasks"
default_effort = "high"
model = "deepseek-v4-flash"
# provider = "opencode"

# [models.kimi]
# description = "Kimi 2.6"
# default_effort = "high"
# model = "kimi-k2.6"
# # provider = "opencode"

# [models.qwen]
# harness = "opencode"
# description = "Qwen 3.6 Plus via OpenCode Go."
# default_effort = "high"
# model = "opencode-go/qwen3.6-plus"
# provider = "opencode"

[models.opus46]
harness = "claude"
description = "Opus 4.6 — best for orchestration, frontend, UI/UX, and creative work. Strong instruction-following."
default_effort = "high"
model = "claude-opus-4-6"
provider = "anthropic"

[models.opus47]
harness = "claude"
description = "Opus 4.7 — strongest benchmarks, best agentic coding. Literal instruction-following breaks complex prompts. Long-context degrades above 100k. 35% more expensive via tokenizer. Needs prompt migration from 4.6."
default_effort = "high"
model = "claude-opus-4-7"
provider = "anthropic"

[models.opus]
harness = "claude"
description = "Best for orchestration, frontend, UI/UX, and creative work. Strong instruction-following."
default_effort = "high"
model = "claude-opus-4-6"
match = ["*opus*"]
provider = "anthropic"
exclude = ["*:*"]

[models.sonnet]
harness = "claude"
description = "Balanced Claude model - good reasoning at lower cost than Opus. Good writing/documentation style."
default_effort = "high"
provider = "anthropic"
match = ["*sonnet*"]
exclude = ["*:*"]

[models.gptmini]
# harness = "codex"
description = "Fast and cheap. Good for bulk exploration and simple tasks."
default_effort = "high"
provider = "openai"
match = ["gpt-5*-mini"]
exclude = ["*-nano"]

[models.codex]
# harness = "codex"
description = "Default backend implementer. Fast, token-efficient, faithful to instructions. Weak at frontend."
default_effort = "high"
provider = "openai"
match = ["gpt-*-codex"]
exclude = [
    "*-mini",
    "*-spark",
    "*-max",
]

[models.gpt]
# harness = "codex"
description = "Strongest generalist. Best all-around judgment, nuanced review, verification, and architectural reasoning."
default_effort = "high"
model = "gpt-5.4"
match = ["gpt-5*"]
provider = "openai"
exclude = [
    "*codex*",
    "*-pro",
    "*-mini",
    "*-nano",
    "*-chat",
    "*-turbo",
]
