[package]
name = "meridian-base"
version = "0.7.8"
description = "Core coordination primitives for Meridian — orchestrator, subagent, and skills for spawning, state tracking, and session context."

[dependencies]

[local-dependencies.meridian-prompter]
url = "https://github.com/meridian-flow/meridian-prompter"

[settings]
models_cache_ttl_hours = 24

[models.composer]
harness = "cursor"
description = "Strong and cheap coding model, but only for coding."
model = "composer-2.5"
provider = "cursor"

[models.deepseek]
description = "Cheap, good text coder for constrained tasks. Stronger reasoning than flash."
default_effort = "high"
model = "deepseek-v4-pro"

[models.deepseekflash]
description = "Cheapest option for mechanical tasks. Fast, low cost, good enough for bulk reading and simple edits."
default_effort = "high"
model = "deepseek-v4-flash"

[models.opus46]
harness = "claude"
description = "Best at inferring human intent. Strong conversational model — preferred for interactive primaries."
default_effort = "high"
model = "claude-opus-4-6"

[models.opus47]
harness = "claude"
description = "Strong agentic coder and UI/UX design. Literal instruction-following — breaks with complex multi-skill prompts."
default_effort = "high"
model = "claude-opus-4-7"

[models.opus48]
harness = "claude"
description = "Best at long-horizon orchestration and managing large numbers of subagents."
default_effort = "high"
model = "claude-opus-4-8"

[models.sonnet]
harness = "claude"
description = "Balanced model - good reasoning at lower cost than Opus. Good writing/documentation style."
default_effort = "high"
provider = "anthropic"
match = ["*sonnet*"]
exclude = ["*:*"]

[models.opus]
harness = "claude"
description = "Latest opus family catch-all. Prefer pinned versions (opus46, opus47, opus48) — each has distinct strengths."
default_effort = "high"
match = ["*opus*"]
exclude = ["*:*"]

[models.gptmini]
description = "Fast and cheap. Good for bulk exploration and simple tasks."
default_effort = "high"
provider = "openai"
match = ["gpt-5*-mini"]
exclude = ["*-nano"]

[models.gpt55]
harness = "codex"
description = "Strongest executor. Executes instructions faithfully; doesn't interpret or read between the lines though."
default_effort = "low"
model = "gpt-5.5"

[models.gpt54]
description = "Good all-around model. Especially good at being a thorough reviewer and finding subtle issues."
default_effort = "high"
model = "gpt-5.4"

[models.gpt]
description = "Strong coding model family. Prefer to use as extremely strong leaf models that do not orchestrate."
default_effort = "high"
match = ["gpt-5*"]
exclude = [
    "*codex*",
    "*-pro",
    "*-mini",
    "*-nano",
    "*-chat",
    "*-turbo",
]
