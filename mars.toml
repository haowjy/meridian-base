[package]
name = "meridian-base"
version = "0.8.0"
description = "Core coordination primitives for Meridian — agent profiles and skills for spawning, state tracking, and session context."

[dependencies]

[local-dependencies.meridian-prompter]
url = "https://github.com/meridian-flow/meridian-prompter"

[settings]
models_cache_ttl_hours = 24

[models.composer]
harness = "cursor"
description = "Strong and cheap coding model, but only for coding. Value 10, intelligence 6, taste 3."
model = "composer-2.5"
provider = "cursor"

[models.deepseek]
description = "Cheap, good text coder for constrained tasks. Stronger reasoning than flash. Value 9, intelligence 6, taste 3."
default_effort = "high"
model = "deepseek-v4-pro"

[models.deepseekflash]
description = "Cheapest option for mechanical tasks. Fast, low cost, good enough for bulk reading and simple edits. Value 10, intelligence 5, taste 2."
default_effort = "high"
model = "deepseek-v4-flash"

[models.opus46]
harness = "claude"
description = "Best at inferring human intent. Strong conversational model; preferred for interactive primaries. Value 4, intelligence 8, taste 9."
default_effort = "high"
model = "claude-opus-4-6"

[models.opus48]
harness = "claude"
description = "Best at long-horizon orchestration and managing large numbers of subagents. Value 3, intelligence 8, taste 8."
default_effort = "high"
model = "claude-opus-4-8"

[models.opus]
harness = "claude"
description = "Opus family catch-all. Prefer pinned versions (opus46, opus48); each has distinct strengths."
default_effort = "high"
match = ["claude*opus*"]
exclude = ["*:*"]

[models.sonnet46]
harness = "claude"
description = "Previous-generation Sonnet. Fast, solid coding and agentic work at lower cost than Opus. Value 6, intelligence 7, taste 6."
default_effort = "high"
model = "claude-sonnet-4-6"

[models.sonnet5]
harness = "claude"
description = "Best combination of speed and intelligence in the Sonnet tier; near-Opus quality on coding and agentic work at Sonnet cost. Value 6, intelligence 8, taste 6."
default_effort = "high"
model = "claude-sonnet-5"

[models.sonnet]
harness = "claude"
description = "Sonnet family catch-all. Prefer pinned versions (sonnet46, sonnet5); each has distinct strengths."
default_effort = "high"
match = ["claude*sonnet*"]
exclude = ["*:*"]

[models.fable]
harness = "claude"
description = "Most capable model for complex tasks. Value 1, intelligence 9, taste 9."
default_effort = "high"
match = ["claude*fable*"]
exclude = ["*:*"]

[models.glm]
harness = "opencode"
description = "Strong coder. Codes well but lacks writing taste. Value 7, intelligence 7, taste 3."
default_effort = "high"
model = "opencode-go/glm-5.2"
provider = "opencode-go"

[models.gptmini]
description = "Fast and cheap. Good for bulk exploration and simple tasks. Value 9, intelligence 5, taste 3."
default_effort = "high"
provider = "openai"
match = ["gpt-5*-mini"]
exclude = ["*-nano"]

[models.gpt55]
harness = "codex"
description = "Strongest executor. Executes instructions faithfully; doesn't interpret or read between the lines though. Value 6, intelligence 8, taste 5."
prompting = "Outcome-first executor. Include the north-star goal, success criteria, relevant high-level context, constraints, expected output shape, and concrete verification: how to prove the goal is met and what evidence to report."
default_effort = "low"
model = "gpt-5.5"

[models.gpt]
description = "Strong coding model family. Prefer as leaf models that do not orchestrate."
default_effort = "high"
match = ["gpt-5*"]
exclude = [
    "*codex*",
    "*-pro",
    "*-mini",
    "*-nano",
    "*-chat",
    "*-turbo",
]
